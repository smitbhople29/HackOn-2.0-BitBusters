<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studease – Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="contact us.css"/>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><img src="studease logo.jpeg" alt="Logo">
    <span>Studease</span>
  </div>
  <div class="header-right">
    <div class="xp-pill">⚡ <span id="total-xp">0</span> XP</div>
    <div class="rank-pill" id="rank-pill" style="--rank-color:#9e9e9e">
      <span class="rank-icon" id="header-rank-icon">🪨</span>
      <span class="rank-name" id="header-rank-name">STONE</span>
    </div>
    <div class="streak-pill">🔥 <span id="streak">7</span> Day Streak</div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">📬 Get In Touch</div>
  <h1>CONTACT <em>US</em></h1>
  <p>We're here to help. Fill out the form below or drop us an email and we'll get back to you soon.</p>
</div>

<!-- CONTACT FORM -->
<div class="contact-section">
  <form class="contact-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="How can we help you?"></textarea>
    </div>
    <button type="submit" class="contact-btn">Send Message</button>
  </form>
</div>

<!-- NAVIGATION -->
<div class="nav-buttons">
  <button class="nav-btn back-btn" onclick="window.location.href='quiz page 1.html'">
    ← Back to Quiz
  </button>
  <button class="nav-btn" onclick="window.location.href='about us.html'">
    ℹ️ About Us
  </button>
</div>

<script>
// form submission stub
const form = document.querySelector('.contact-form');
form.addEventListener('submit', e => {
  e.preventDefault();
  alert('Thank you! Your message has been sent.');
  form.reset();
});

// dummy xp/streak
document.getElementById('total-xp').textContent = '1300';
document.getElementById('streak').textContent = '10';
</script>

</body>
</html>
